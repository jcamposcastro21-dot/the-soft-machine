<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    (function() {
      const repo = "/the-soft-machine";
      let path = location.pathname;

      // Evitar loop infinito
      if (path.endsWith("index.html")) return;

      // Guardar ruta original
      sessionStorage.setItem("redirect", path);

      // Redirigir correctamente
      location.replace(repo + "/index.html");
    })();
  </script>
</head>
<body></body>
</html>
